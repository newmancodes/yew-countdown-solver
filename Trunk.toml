[serve]
headers = { "Referrer-Policy" = "no-referrer", "X-Content-Type-Options" = "nosniff", "Permissions-Policy" = "geolocation=(), camera=(), microphone=(), payment=()", "Content-Security-Policy" = "default-src 'self'; script-src 'unsafe-inline' 'unsafe-eval'; script-src-elem 'self' 'unsafe-inline'" }

[[hooks]]
stage = "pre_build"
command = "npm"
command_arguments = ["run", "build"]
