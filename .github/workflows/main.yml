name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - run: |
          rustup target add wasm32-unknown-unknown
          cargo install trunk wasm-bindgen-cli

      - run: cargo fmt --check

      - run: cargo test

      - run: trunk build --release